server {
    listen 80;

    # ── Fichiers React statiques ─────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;

        # Indispensable pour les SPA (Single Page Applications) :
        # si l'URL ne correspond à aucun fichier, renvoyer index.html
        # React gère ensuite la navigation côté client
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy inverse vers le backend Express ────────────────
    # Toute requête vers /projets/* est transmise au conteneur backend
    # "backend" est résolu par le DNS interne de Docker
    # (nom du service déclaré dans docker-compose.yml)
    location /projets {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Route de santé de l'API ──────────────────────────────
    # Permet d'accéder à GET / du backend depuis http://localhost/api-health
    location /api-health {
        proxy_pass http://backend:3001/;
    }
}
