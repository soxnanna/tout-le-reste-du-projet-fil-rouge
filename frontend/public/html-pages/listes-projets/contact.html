<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Création du formulaire de contact </title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../css-pages/contact.css" />
</head>

<body>

  <div class="page-wrapper">
    <div class="card">
      <a href="../index.html" class="btn-back">
        ← Retour à l'accueil
      </a>

      <h1 class="form-title">Sujet </h1>

      <form action="contact.html" method="get" class="project-form">
        <div class="form-group">
          <label for="Nom">Nom :</label>
          <input type="text" id="Nom" name="Nom" placeholder="Ex: Saisisi le nom " required />
        </div>
        <div class="form-group">
          <label for="Email">Email :</label>
          <input type="email" id="Email" name="Email" placeholder="Ex: entrer le email" required />
        </div>


        <div class="form-group">
          <label for="message">Message :</label>
          <textarea id="message" name="message" placeholder="Ex: Saisissez votre message..."></textarea>
        </div>
